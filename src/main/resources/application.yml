server:
  port: 8080

spring:
  application:
    name: occasion-predictor-ai
  datasource:
    url: jdbc:postgresql://localhost:5432/occasion_predictor
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3:latest
        options:
          temperature: 0.1
          top-k: 40
          top-p: 0.9
          num-predict: 200
      embedding:
        model: nomic-embed-text:latest
    vectorstore:
      pgvector:
        initialize-schema: false
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 768

app:
  rag:
    chunk-size: 800
    chunk-overlap: 100

logging:
  level:
    org.springframework.ai: INFO
    org.kishorereddy.occasionpredictor: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha