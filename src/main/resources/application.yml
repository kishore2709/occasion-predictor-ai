server:
  port: 8081

spring:
  application:
    name: occasion-predictor-ai
  datasource:
    url: jdbc:postgresql://localhost:5432/occasion_predictor
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3:latest
        options:
          temperature: 0.1
          top-k: 40
          top-p: 0.9
          num-predict: 200
      embedding:
        model: nomic-embed-text:latest
    vectorstore:
      pgvector:
        initialize-schema: false
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 768

  redis:
    host: localhost
    port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:}   # set via env var when Keycloak is running

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

app:
  rag:
    chunk-size: 800
    chunk-overlap: 100
    top-k: 5
    similarity-threshold: 0.5
  cache:
    prediction-ttl-seconds: 86400   # 24 h — same orderId always returns same result
    rag-ttl-seconds: 1800           # 30 min — retrieval results for the same query
  rate-limit:
    requests-per-minute: 20
  kafka:
    retry:
      max-attempts: 3
      backoff-ms: 2000
  security:
    enabled: ${SECURITY_ENABLED:false}   # true + JWT_ISSUER_URI required for JWT validation

logging:
  level:
    org.springframework.ai: INFO
    org.kishorereddy.occasionpredictor: DEBUG
    SECURITY_AUDIT: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha