services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: occasion-predictor-db
    environment:
      POSTGRES_DB: occasion_predictor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - occasion_predictor_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d occasion_predictor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  occasion_predictor_data:
