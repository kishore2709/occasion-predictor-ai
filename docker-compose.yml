services:
  redis:
    image: redis:7-alpine
    container_name: occasion-predictor-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg17
    container_name: occasion-predictor-db
    environment:
      POSTGRES_DB: occasion_predictor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - occasion_predictor_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d occasion_predictor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  occasion_predictor_data:
